<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0c1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="90" x2="640" y2="90" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="180" x2="640" y2="180" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="270" x2="640" y2="270" stroke="#1e293b" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="360" stroke="#1e293b" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="360" stroke="#1e293b" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="360" stroke="#1e293b" stroke-width="1"/>

  <!-- Pipeline nodes -->
  <circle cx="120" cy="180" r="24" fill="none" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <circle cx="120" cy="180" r="8" fill="#06b6d4"/>
  <circle cx="280" cy="180" r="24" fill="none" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <circle cx="280" cy="180" r="8" fill="#06b6d4"/>
  <circle cx="440" cy="180" r="24" fill="none" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <circle cx="440" cy="180" r="8" fill="#06b6d4"/>
  <circle cx="560" cy="180" r="18" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="560" cy="180" r="6" fill="#22d3ee"/>

  <!-- Pipeline connections -->
  <line x1="144" y1="180" x2="256" y2="180" stroke="url(#accent)" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="304" y1="180" x2="416" y2="180" stroke="url(#accent)" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="464" y1="180" x2="542" y2="180" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Node labels -->
  <text x="120" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">INPUT</text>
  <text x="280" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">LLM</text>
  <text x="440" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">PROCESS</text>
  <text x="560" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">OUTPUT</text>

  <!-- Accent bar -->
  <rect x="60" y="270" width="120" height="3" fill="url(#accent)" rx="2"/>

  <!-- Title -->
  <text x="60" y="310" fill="#f1f5f9" font-size="22" font-weight="700" font-family="'Plus Jakarta Sans', sans-serif" letter-spacing="-0.5">LLM Automation</text>
  <text x="60" y="335" fill="#94a3b8" font-size="13" font-family="'Plus Jakarta Sans', sans-serif">Pipeline · Claude API · Workflow Automation</text>
</svg>
