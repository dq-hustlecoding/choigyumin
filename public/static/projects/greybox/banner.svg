<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="90" x2="640" y2="90" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="0" y1="180" x2="640" y2="180" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="0" y1="270" x2="640" y2="270" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="360" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Growth chart bars -->
  <rect x="80" y="220" width="36" height="60" fill="#e2e8f0" rx="3"/>
  <rect x="136" y="195" width="36" height="85" fill="#cbd5e1" rx="3"/>
  <rect x="192" y="165" width="36" height="115" fill="#94a3b8" rx="3"/>
  <rect x="248" y="130" width="36" height="150" fill="#64748b" rx="3"/>
  <rect x="304" y="100" width="36" height="180" fill="#475569" rx="3"/>
  <rect x="360" y="60" width="36" height="220" fill="#06b6d4" rx="3"/>

  <!-- Trend line -->
  <polyline points="98,215 154,190 210,160 266,125 322,95 378,55" fill="none" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend dots -->
  <circle cx="98" cy="215" r="4" fill="#06b6d4"/>
  <circle cx="154" cy="190" r="4" fill="#06b6d4"/>
  <circle cx="210" cy="160" r="4" fill="#06b6d4"/>
  <circle cx="266" cy="125" r="4" fill="#06b6d4"/>
  <circle cx="322" cy="95" r="4" fill="#06b6d4"/>
  <circle cx="378" cy="55" r="5" fill="#0e7490"/>

  <!-- +40% badge -->
  <rect x="460" y="80" width="120" height="44" fill="#0f172a" rx="8"/>
  <text x="520" y="97" text-anchor="middle" fill="#22d3ee" font-size="10" font-family="monospace" letter-spacing="1">GROWTH</text>
  <text x="520" y="116" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700" font-family="'Plus Jakarta Sans', sans-serif">+40%</text>

  <!-- Accent bar -->
  <rect x="60" y="278" width="100" height="3" fill="url(#accent)" rx="2"/>

  <!-- Title -->
  <text x="60" y="316" fill="#0f172a" font-size="22" font-weight="700" font-family="'Plus Jakarta Sans', sans-serif" letter-spacing="-0.5">Greybox</text>
  <text x="60" y="341" fill="#64748b" font-size="13" font-family="'Plus Jakarta Sans', sans-serif">Technical Advisory · Enterprise Growth</text>
</svg>
